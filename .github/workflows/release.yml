name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  preflight:
    name: 校验版本与发布状态
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: 获取代码
        uses: actions/checkout@v7

      - name: 校验版本一致性
        run: node scripts/check-release-version.mjs "$GITHUB_REF_TYPE" "$GITHUB_REF_NAME"

      - name: 禁止覆盖已公开版本
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          version="$(jq -r '.version' src-tauri/tauri.conf.json)"
          if release="$(gh api "repos/$GITHUB_REPOSITORY/releases/tags/v$version" 2>/dev/null)"; then
            test "$(jq -r '.draft' <<< "$release")" = "true"
          fi

  publish:
    name: ${{ matrix.name }}
    needs: preflight
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            platform: windows-latest
            args: "--bundles nsis,msi"
            linux: false
          - name: macOS Apple Silicon
            platform: macos-latest
            args: "--target aarch64-apple-darwin --bundles dmg"
            rust_targets: aarch64-apple-darwin
            linux: false
          - name: macOS Intel
            platform: macos-latest
            args: "--target x86_64-apple-darwin --bundles dmg"
            rust_targets: x86_64-apple-darwin
            linux: false
          - name: Linux x64
            platform: ubuntu-22.04
            args: "--bundles appimage,deb"
            linux: true
          - name: Linux ARM64
            platform: ubuntu-22.04-arm
            args: "--bundles appimage,deb"
            linux: true
    runs-on: ${{ matrix.platform }}
    steps:
      - name: 获取代码
        uses: actions/checkout@v7

      - name: 安装 Linux 构建依赖
        if: matrix.linux
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils

      - name: 配置 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: 配置 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: 缓存 Rust 构建目录
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: 安装前端依赖
        run: npm ci

      - name: 构建并上传跨平台安装包
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: ${{ startsWith(matrix.platform, 'macos') && '-' || '' }}
        with:
          tagName: v__VERSION__
          releaseName: "QuotaGlance v__VERSION__ 软件安装包（Windows / macOS / Linux）"
          releaseBody: |
            QuotaGlance 开源跨平台桌面软件安装包。

            本版本让卡片与悬浮球统一聚焦周额度，暂时隐藏五小时/短周期额度。透明窗口的裁切和背景叠层已经修正，320 × 320 卡片保持完整圆角矩形，不再出现隐约的方形底框。悬浮球按玻璃水球方向重新设计，强化球壳高光、水线、液体层次、气泡和轻微晃动效果，并继续支持拖拽、双击展开、主题切换和“设置 / 退出”右键菜单。公开仓库同时精简仅用于内部过程记录的 Markdown 文档。

            请在页面下方的 Assets 中下载对应平台的软件：
            - Windows x64：NSIS `.exe` 或 MSI `.msi`
            - macOS Apple Silicon / Intel：`.dmg`
            - Linux x64 / ARM64：`.AppImage` 或 `.deb`

            Release 同时提供 `SHA256SUMS.txt`，可用于核对下载文件完整性。

            重要说明：
            - 本版本未附带或重新分发 Codex App Server sidecar。运行前需安装并登录包含 Codex 的 ChatGPT 桌面应用、旧版 Codex 桌面应用或 Codex CLI。
            - Windows 会优先复用 Codex 桌面应用受管运行时；macOS 会优先检查 `/Applications` 或 `~/Applications` 下统一版 `ChatGPT.app`，再兼容旧版 `Codex.app`，最后回退到 PATH 和常见 CLI 目录；Linux 会检查 PATH 和常见 CLI 目录。
            - macOS 应用内运行组件仍属于用户本机的外部安装：本版校验固定路径、普通文件、执行位与符号链接边界，但尚未验证 bundle identifier 或 OpenAI 代码签名身份。
            - 额度只通过本机 `codex app-server` 的只读协议获取。QuotaGlance 不读取 `auth.json`、Token 或系统凭据库，不调用非公开 `wham` HTTP 接口，也不消耗重置机会。
            - Windows 安装包未进行 Authenticode 签名，macOS 仅使用 ad-hoc 签名且未公证；macOS/Linux 尚未完成全部实机验收，系统可能显示安全提醒。
          releaseDraft: true
          prerelease: false
          generateReleaseNotes: true
          uploadUpdaterJson: false
          uploadUpdaterSignatures: false
          releaseAssetNamePattern: "[name]_[version]_[platform]_[arch][setup][ext]"
          retryAttempts: 2
          args: ${{ matrix.args }}

  publish-checksums:
    name: 生成校验和并公开 Latest Release
    needs: publish
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 获取代码
        uses: actions/checkout@v7

      - name: 解析发布标签
        run: echo "TAG_NAME=v$(jq -r '.version' src-tauri/tauri.conf.json)" >> "$GITHUB_ENV"

      - name: 下载 Release 资产
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release download "$TAG_NAME" --repo "$GITHUB_REPOSITORY" --dir release-assets

      - name: 生成 SHA-256 清单
        working-directory: release-assets
        run: |
          find . -maxdepth 1 -type f ! -name 'SHA256SUMS.txt' -print0 \
            | sort -z \
            | xargs -0 sha256sum \
            | sed 's#  \./#  #' > SHA256SUMS.txt
          test -s SHA256SUMS.txt
          asset_count="$(find . -maxdepth 1 -type f ! -name 'SHA256SUMS.txt' | wc -l | tr -d ' ')"
          checksum_count="$(wc -l < SHA256SUMS.txt | tr -d ' ')"
          test "$asset_count" -eq 8
          test "$checksum_count" -eq "$asset_count"
          sha256sum --check SHA256SUMS.txt

      - name: 上传校验清单并公开 Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "$TAG_NAME" release-assets/SHA256SUMS.txt --repo "$GITHUB_REPOSITORY" --clobber
          gh release edit "$TAG_NAME" --repo "$GITHUB_REPOSITORY" --draft=false --prerelease=false --latest
          release_state="$(gh api "repos/$GITHUB_REPOSITORY/releases/tags/$TAG_NAME")"
          test "$(jq -r '.draft' <<< "$release_state")" = "false"
          test "$(jq -r '.prerelease' <<< "$release_state")" = "false"
          test "$(gh api "repos/$GITHUB_REPOSITORY/releases/latest" --jq '.tag_name')" = "$TAG_NAME"
