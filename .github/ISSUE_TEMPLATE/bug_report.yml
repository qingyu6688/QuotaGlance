name: Bug 报告
description: 报告可复现的功能或兼容性问题
title: "[Bug] "
labels: ["bug", "需要确认"]
body:
  - type: markdown
    attributes:
      value: 请先确认没有在内容中包含 Token、Cookie、auth.json、真实账号响应或个人路径。
  - type: input
    id: version
    attributes:
      label: QuotaGlance 版本
      placeholder: 例如 0.1.0
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: 操作系统
      options:
        - Windows 11
        - Windows 10
        - macOS Apple Silicon
        - macOS Intel
        - Linux x64
        - Linux ARM64
        - 其他
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 使用最小、稳定且不包含敏感数据的步骤。
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期结果
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际结果
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: 补充信息
      description: 可提供已脱敏日志、截图、桌面环境和 Codex CLI 版本。
  - type: checkboxes
    id: privacy
    attributes:
      label: 隐私确认
      options:
        - label: 我已移除所有凭据、账号响应和个人信息。
          required: true
