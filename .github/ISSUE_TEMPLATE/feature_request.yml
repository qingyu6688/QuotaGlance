name: 功能建议
description: 提议新能力、交互或平台改进
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 使用场景
      description: 说明当前遇到的问题，而不只是描述方案。
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: 影响平台
      multiple: true
      options:
        - Windows
        - macOS
        - Linux
        - 全平台
  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案与兼容性影响
  - type: checkboxes
    id: contribution
    attributes:
      label: 参与意愿
      options:
        - label: 我愿意提交 Pull Request 或协助测试。
